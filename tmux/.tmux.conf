# ========================================
# MEGA TMUX CONFIG - CLEAN STATUS BAR
# ========================================

# Enable mouse support
set -g mouse on

# Enable 256 colors and true color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",*256col*:Tc"
# Add fbterm support
set -ga terminal-overrides ",fbterm:Tc"

# ========================================
# BASIC SETTINGS
# ========================================
# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Faster key repetition
set -s escape-time 0

# Increase scrollback buffer size
set -g history-limit 50000

# Display tmux messages for 4 seconds
set -g display-time 4000

# ========================================
# SPLITS (Konsole-style)
# ========================================
bind ) split-window -h
bind ( split-window -v

# ========================================
# VISUAL INDICATORS FOR ACTIVE PANE
# ========================================
# Pane border colors
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour51,bold'

# Different background for active/inactive panes
set -g window-style 'fg=colour247,bg=colour236'
set -g window-active-style 'fg=colour250,bg=black'

# Show pane information in border
set -g pane-border-status top
set -g pane-border-format " #{pane_index} #{?pane_active,#[fg=colour51]* #[default],  }#{pane_current_command}"

# ========================================
# NAVIGATION WITH ARROWS
# ========================================
# Switch panes with Shift+arrow (no prefix needed!)
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D

# Switch windows/tabs with Ctrl+Shift+arrow
bind -n C-S-Left previous-window
bind -n C-S-Right next-window

# Quick window jumping with Alt+number
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Create new window with Ctrl+T
bind -n C-t new-window

# ========================================
# RESIZE MODE
# ========================================
# Enter resize mode with prefix + r
bind r switch-client -T resize

# Resize with arrow keys
bind -T resize Up resize-pane -U 5 \; switch-client -T resize
bind -T resize Down resize-pane -D 5 \; switch-client -T resize
bind -T resize Left resize-pane -L 5 \; switch-client -T resize
bind -T resize Right resize-pane -R 5 \; switch-client -T resize

# Fine-tune with Shift + arrows
bind -T resize S-Up resize-pane -U 1 \; switch-client -T resize
bind -T resize S-Down resize-pane -D 1 \; switch-client -T resize
bind -T resize S-Left resize-pane -L 1 \; switch-client -T resize
bind -T resize S-Right resize-pane -R 1 \; switch-client -T resize

# Exit resize mode
bind -T resize Enter switch-client -T root
bind -T resize q switch-client -T root
bind -T resize Escape switch-client -T root

# ========================================
# SIMPLE STATUS BAR
# ========================================
# Status bar position and colors
set -g status-position top
set -g status-style 'bg=colour235,fg=colour245'

# Configure lengths
set -g status-left-length 20
set -g status-right-length 100

# Left: session name
set -g status-left '#[fg=colour51,bold][#S] '

# Center: window list
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=colour239,fg=colour51"
set -g status-justify centre

# Right: Essential commands only
set -g status-right '#{?client_prefix,#[bg=colour52]>>> ,}#[bg=colour238,fg=colour250]split:^b)═/║ #[fg=colour240]│#[fg=colour250] tab:^T #[fg=colour240]│#[fg=colour250] switch:^S←→/Alt1-9 #[fg=colour240]│#[fg=colour250] resize:^br #[bg=colour235,fg=colour250] %H:%M'

# ========================================
# ADDITIONAL HELPFUL BINDINGS
# ========================================
# Reload config with prefix + R
bind R source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Toggle mouse on/off with prefix + m
bind m set -g mouse \; display 'Mouse: #{?mouse,ON,OFF}'

# ========================================
# COPY MODE SETTINGS
# ========================================
# Use vi-style keys in copy mode
setw -g mode-keys vi

# Enter copy mode with prefix + [
bind [ copy-mode
