# ========================================
# MEGA TMUX CONFIG - CLEAN STATUS BAR
# ========================================

# Enable mouse support
set -g mouse on

# Colors: pass 24-bit truecolor through verbatim instead of quantizing it to
# the 256-palette (quantization is what makes colors look dimmer / "off").
#  - tmux-256color: the correct internal terminfo for tmux 3.x.
#  - RGB: the *standard* terminfo cap for 24-bit (preferred over tmux's legacy
#    Tc). Advertise it for the outer terminals we actually run under; tmux then
#    forwards RGB sequences untouched. Requires COLORTERM=truecolor outside.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:RGB,*256col*:RGB,fbterm:RGB"

# ========================================
# BASIC SETTINGS
# ========================================
# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1

# Automatically renumber windows when one is closed
set -g renumber-windows on

# Faster key repetition
set -s escape-time 0

# Increase scrollback buffer size
set -g history-limit 50000

# Display tmux messages for 4 seconds
set -g display-time 4000

# ========================================
# SPLITS (Konsole-style)
# ========================================
# Prefix + ) / (  AND no-prefix Alt+Shift+0 / Alt+Shift+9  (= M-) / M-( ),
# rhyming Konsole's Ctrl+Shift+0 / Ctrl+Shift+9. New panes inherit the cwd.
#   )  / Alt+Shift+0  → split horizontal (side by side)
#   (  / Alt+Shift+9  → split vertical   (stacked)
bind    )    split-window -h -c "#{pane_current_path}"
bind    (    split-window -v -c "#{pane_current_path}"
bind -n M-)  split-window -h -c "#{pane_current_path}"
bind -n M-(  split-window -v -c "#{pane_current_path}"

# ========================================
# VISUAL INDICATORS FOR ACTIVE PANE
# ========================================
# Pane border colors
set -g pane-border-style 'fg=colour240'
set -g pane-active-border-style 'fg=colour51,bold'

# Dim inactive panes' TEXT only — no bg override, so the terminal's own
# background shows through (an explicit bg= here paints a gray/black "wash"
# over the pane content that fights the terminal theme and hurts readability).
set -g window-style 'fg=colour247,bg=default'
set -g window-active-style 'fg=default,bg=default'

# Show pane information in border
set -g pane-border-status top
set -g pane-border-format " #{pane_index} #{?pane_active,#[fg=colour51]* #[default],  }#{pane_current_command}"

# ========================================
# NAVIGATION WITH ARROWS
# ========================================
# Switch panes with Shift+arrow (no prefix needed!)
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D

# Switch windows/tabs with Ctrl+Shift+arrow
bind -n C-S-Left previous-window
bind -n C-S-Right next-window

# Quick window jumping with Alt+number
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Create new window with Ctrl+T
bind -n C-t new-window

# ========================================
# RESIZE MODE
# ========================================
# Enter resize mode with prefix + r
bind r switch-client -T resize

# Resize with arrow keys
bind -T resize Up resize-pane -U 5 \; switch-client -T resize
bind -T resize Down resize-pane -D 5 \; switch-client -T resize
bind -T resize Left resize-pane -L 5 \; switch-client -T resize
bind -T resize Right resize-pane -R 5 \; switch-client -T resize

# Fine-tune with Shift + arrows
bind -T resize S-Up resize-pane -U 1 \; switch-client -T resize
bind -T resize S-Down resize-pane -D 1 \; switch-client -T resize
bind -T resize S-Left resize-pane -L 1 \; switch-client -T resize
bind -T resize S-Right resize-pane -R 1 \; switch-client -T resize

# Exit resize mode
bind -T resize Enter switch-client -T root
bind -T resize q switch-client -T root
bind -T resize Escape switch-client -T root

# ========================================
# SIMPLE STATUS BAR
# ========================================
# Status bar position and colors
set -g status-position top
set -g status-style 'bg=colour235,fg=colour245'

# Configure lengths
set -g status-left-length 80
set -g status-right-length 100

# Left: CUA-style clickable menu bar + session name
# Each #[range=user|m_*] region is clickable; clicks are dispatched by the
# MouseDown1Status binding in the CUA MENU BAR section below.
set -g status-left '#[fg=colour51,bold]#[range=user|m_file] File #[norange]#[range=user|m_edit] Edit #[norange]#[range=user|m_view] View #[norange]#[range=user|m_win] Window #[norange]#[range=user|m_session] Session #[norange]#[default] #[fg=colour46,bold][#S] '

# Center: window list
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g window-status-current-style "bg=colour239,fg=colour51"
set -g status-justify centre

# Right: clickable action buttons (dispatched by MouseDown1Status below)
#   [║][═] split   [+tab] new window   [‹][›] switch   [resize] enter resize mode
set -g status-right '#{?client_prefix,#[bg=colour52,fg=colour231] PREFIX #[default] ,}#[range=user|b_splith,bg=colour238,fg=colour51] ║ #[norange,default]#[range=user|b_splitv,bg=colour238,fg=colour51] ═ #[norange,default]#[fg=colour240]split #[range=user|b_tab,bg=colour238,fg=colour46] +tab #[norange,default] #[range=user|b_prev,bg=colour238,fg=colour250] ‹ #[norange,default]#[range=user|b_next,bg=colour238,fg=colour250] › #[norange,default]#[fg=colour240]switch #[range=user|b_resize,bg=colour238,fg=colour214] resize #[norange,default] #[range=user|b_mouse]#{?mouse,#[bg=colour22]#[fg=colour231] mouse:on ,#[bg=colour52]#[fg=colour231] mouse:off }#[norange]#[default] #[fg=colour250]%H:%M '

# ========================================
# ADDITIONAL HELPFUL BINDINGS
# ========================================
# Reload config with prefix + R
bind R source-file ~/.tmux.conf \; display-message "Config reloaded!"

# Toggle mouse — three ways, all flip the mouse:on/off button in the status bar:
#   prefix m   ·   Shift+F12 (no prefix; works even when mouse is OFF)   ·
#   click the [mouse:on] button (turns it OFF — use a key to turn it back ON).
# refresh-client -S redraws the status bar so the indicator flips instantly.
bind    m     set -gF mouse "#{?mouse,off,on}" \; refresh-client -S \; display 'Mouse #{?mouse,ON,OFF}'
bind -n S-F12 set -gF mouse "#{?mouse,off,on}" \; refresh-client -S \; display 'Mouse #{?mouse,ON,OFF}'

# ========================================
# COPY MODE SETTINGS
# ========================================
# Use vi-style keys in copy mode
setw -g mode-keys vi

# Enter copy mode with prefix + [
bind [ copy-mode

# ========================================
# CUA MENU BAR (native display-menu — instant, minimal overlay)
# ========================================
# Native tmux menus: instant, and they cover only the dropdown itself (no
# full-screen popup, no launch latency). Two ways in:
#   • Click a File/Edit/View/Window/Session label → its menu drops at the cursor.
#   • F12 / Shift-F10 → "menu bar mode", then the mnemonic (f/e/v/w/s).
# Status-right buttons + window-name clicks are direct actions. Right-clicking a
# pane opens the File menu at the cursor.
#
# NOTE: each menu's items are listed twice — once for the keyboard (menubar table,
# fixed x under its label) and once for mouse clicks (at the cursor). tmux has no
# way to share one definition between a key-table binding and a mouse binding.

# --- Keyboard: F12 / Shift-F10 enter the 'menubar' table; next key drops a menu ---
bind -n F12   switch-client -T menubar \; display-message "MENU  f:File  e:Edit  v:View  w:Window  s:Session   (Esc cancels)"
bind -n S-F10 switch-client -T menubar \; display-message "MENU  f:File  e:Edit  v:View  w:Window  s:Session   (Esc cancels)"

bind -T menubar f display-menu -T "#[align=centre fg=colour51] File " -x 2 -y S \
  "New Window"   t "new-window -c \"#{pane_current_path}\"" \
  "Split Right"  r "split-window -h -c \"#{pane_current_path}\"" \
  "Split Down"   d "split-window -v -c \"#{pane_current_path}\"" \
  "" \
  "Close Pane"   x "kill-pane" \
  "Close Window" w "confirm-before -p \"Close this window and ALL its splits? (y/n) \" kill-window" \
  "" \
  "Detach  —  exit, sessions stay alive" D "detach-client" \
  "Quit tmux  —  kill ALL sessions"      Q "confirm-before -p \"Kill ALL tmux sessions? (y/n) \" kill-server"
bind -T menubar e display-menu -T "#[align=centre fg=colour51] Edit " -x 8 -y S \
  "Copy Mode"   c "copy-mode" \
  "Paste"       p "paste-buffer -p" \
  "" \
  "Search"      / "copy-mode \; send-keys ?"
bind -T menubar v display-menu -T "#[align=centre fg=colour51] View " -x 14 -y S \
  "Layout Horizontal" h "select-layout even-horizontal" \
  "Layout Vertical"   v "select-layout even-vertical" \
  "Layout Tiled"      t "select-layout tiled" \
  "" \
  "Zoom Pane"    z "resize-pane -Z" \
  "Mouse On"     o "set -g mouse on \; refresh-client -S \; display 'Mouse ON'" \
  "Mouse Off"    O "set -g mouse off \; refresh-client -S \; display 'Mouse OFF'" \
  "" \
  "Reload Config" R "source-file ~/.tmux.conf \; display-message \"tmux config reloaded\""
bind -T menubar w display-menu -T "#[align=centre fg=colour51] Window " -x 20 -y S \
  "Next"        n "next-window" \
  "Previous"    p "previous-window" \
  "Rename..."   r "command-prompt -I \"#W\" \"rename-window -- '%%'\""
bind -T menubar s display-menu -T "#[align=centre fg=colour51] Session " -x 28 -y S \
  "Attach / List Sessions" a "choose-tree -Zs" \
  "New Session..."   s "command-prompt -p \"New session:\" \"new-session -s '%%'\"" \
  "Rename Session..." r "command-prompt -I \"#S\" \"rename-session -- '%%'\""
bind -T menubar Escape switch-client -T root
bind -T menubar q      switch-client -T root

# --- Mouse: clicking a status label opens the same menu at the cursor ---
bind -n MouseDown1Status {
  if -F "#{==:#{mouse_status_range},m_file}" {
    display-menu -T "#[align=centre fg=colour51] File " -x M -y S \
      "New Window"   t "new-window -c \"#{pane_current_path}\"" \
      "Split Right"  r "split-window -h -c \"#{pane_current_path}\"" \
      "Split Down"   d "split-window -v -c \"#{pane_current_path}\"" \
      "" \
      "Close Pane"   x "kill-pane" \
      "Close Window" w "confirm-before -p \"Close this window and ALL its splits? (y/n) \" kill-window" \
      "" \
      "Detach  —  exit, sessions stay alive" D "detach-client" \
      "Quit tmux  —  kill ALL sessions"      Q "confirm-before -p \"Kill ALL tmux sessions? (y/n) \" kill-server"
  }
  if -F "#{==:#{mouse_status_range},m_edit}" {
    display-menu -T "#[align=centre fg=colour51] Edit " -x M -y S \
      "Copy Mode"   c "copy-mode" \
      "Paste"       p "paste-buffer -p" \
      "" \
      "Search"      / "copy-mode \; send-keys ?"
  }
  if -F "#{==:#{mouse_status_range},m_view}" {
    display-menu -T "#[align=centre fg=colour51] View " -x M -y S \
      "Layout Horizontal" h "select-layout even-horizontal" \
      "Layout Vertical"   v "select-layout even-vertical" \
      "Layout Tiled"      t "select-layout tiled" \
      "" \
      "Zoom Pane"    z "resize-pane -Z" \
      "Mouse On"     o "set -g mouse on \; refresh-client -S \; display 'Mouse ON'" \
      "Mouse Off"    O "set -g mouse off \; refresh-client -S \; display 'Mouse OFF'" \
      "" \
      "Reload Config" R "source-file ~/.tmux.conf \; display-message \"tmux config reloaded\""
  }
  if -F "#{==:#{mouse_status_range},m_win}" {
    display-menu -T "#[align=centre fg=colour51] Window " -x M -y S \
      "Next"        n "next-window" \
      "Previous"    p "previous-window" \
      "Rename..."   r "command-prompt -I \"#W\" \"rename-window -- '%%'\""
  }
  if -F "#{==:#{mouse_status_range},m_session}" {
    display-menu -T "#[align=centre fg=colour51] Session " -x M -y S \
      "Attach / List Sessions" a "choose-tree -Zs" \
      "New Session..."   s "command-prompt -p \"New session:\" \"new-session -s '%%'\"" \
      "Rename Session..." r "command-prompt -I \"#S\" \"rename-session -- '%%'\""
  }
  if -F "#{==:#{mouse_status_range},b_splith}" { split-window -h -c "#{pane_current_path}" }
  if -F "#{==:#{mouse_status_range},b_splitv}" { split-window -v -c "#{pane_current_path}" }
  if -F "#{==:#{mouse_status_range},b_tab}"    { new-window -c "#{pane_current_path}" }
  if -F "#{==:#{mouse_status_range},b_prev}"   { previous-window }
  if -F "#{==:#{mouse_status_range},b_next}"   { next-window }
  if -F "#{==:#{mouse_status_range},b_resize}" { switch-client -T resize }
  if -F "#{==:#{mouse_status_range},b_mouse}"  { set -gF mouse "#{?mouse,off,on}" ; refresh-client -S ; display "Mouse #{?mouse,ON,OFF}" }
  if -F "#{==:#{mouse_status_range},window}"   { select-window -t = }
}

# --- Right-click a pane → File menu at the cursor (replaces tmux's native menus) ---
unbind -n MouseDown3StatusLeft
unbind -n M-MouseDown3Pane
unbind -n M-MouseDown3Status
unbind -n M-MouseDown3StatusLeft
bind -n MouseDown3Pane display-menu -T "#[align=centre fg=colour51] File " -x M -y M \
  "New Window"   t "new-window -c \"#{pane_current_path}\"" \
  "Split Right"  r "split-window -h -c \"#{pane_current_path}\"" \
  "Split Down"   d "split-window -v -c \"#{pane_current_path}\"" \
  "" \
  "Close Pane"   x "kill-pane" \
  "" \
  "Detach  —  exit, sessions stay alive" D "detach-client"

# ========================================
# PLUGINS (TPM) — the actual goal: resumable shells
# ========================================
# resurrect: save/restore sessions, windows, panes, layouts (prefix+Ctrl-s / Ctrl-r)
# continuum: auto-save every 15 min AND auto-restore on tmux server start → your
#            sessions survive a reboot. This is what makes "ssh in, it's all still
#            there" work without you remembering to do anything.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

# Keep this line LAST — it bootstraps TPM and loads the plugins above.
run '~/.tmux/plugins/tpm/tpm'
